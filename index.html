<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ders 1 - Ilk Uygulamam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <p class="eyebrow">YAZILIMA YENIDEN MERHABA</p>
    <h1>Ercan'in ilk modern uygulamasi</h1>
    <p class="intro">
      Adinizi yazin, uygulama sizi selamlasin. Sayac da kaldigi yerden devam etsin.
    </p>

    <form id="greetingForm" class="greeting-box">
      <label for="nameInput">Adiniz</label>
      <div class="input-row">
        <input
          id="nameInput"
          type="text"
          placeholder="Ornek: Ercan"
          autocomplete="name"
        >
        <button id="greetButton" type="submit">Selamla</button>
      </div>
      <p id="greetingMessage" class="greeting-message" aria-live="polite">
        Adinizi yazip Selamla dugmesine basin.
      </p>
    </form>

    <section class="counter" aria-live="polite">
      <span>Toplam tiklama</span>
      <strong id="count">0</strong>
    </section>

    <div class="actions">
      <button id="increaseButton" type="button">Sayiyi artir</button>
      <button id="resetButton" class="secondary" type="button">Sifirla</button>
    </div>

    <p id="message" class="message">Uygulama hazir.</p>
  </main>

  <script src="app.js?v=3"></script>
</body>
</html>
